name: e2e tests

on:
  workflow_run:
    workflows: [gh page deploy]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run-e2e:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    # Browsers + OS deps are pre-baked in this image, so there is no
    # `playwright install` step. Keep this tag in lockstep with the
    # @playwright/test version in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
      # Firefox requires $HOME to be owned by the running user; GitHub Actions
      # sets HOME=/github/home (owned by pwuser), so override it.
      options: --user root
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js (from .nvmrc)
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright (against deployed site)
        env:
          CI: true
          E2E_BASE_URL: https://darrenjaworski.github.io/kanbeasy
        run: >
          npx playwright test
          --project=${{ matrix.browser }}
          --shard=${{ matrix.shard }}/3
          --grep-invert "Visual regression"
          --reporter=blob

      - name: Upload blob report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: blob-${{ matrix.browser }}-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  merge-report:
    needs: run-e2e
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js (from .nvmrc)
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v7
        with:
          path: all-blobs
          pattern: blob-*

      - name: Merge into HTML report
        run: npx playwright merge-reports --reporter=html ./all-blobs

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
